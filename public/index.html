<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8"/>

		<title>dynamic productions</title>
		
		<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logos/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logos/favicon-16x16.png">
		<link rel="icon" type="image/x-icon" href="/favicon.ico">
		
		<style id="style">
			body {
				background-color: black;
				margin: 0px;
				border: 0px;
				user-select: none;
				color: white;
				font-family: "Courier New", monospace;
			}
			#script-description {
				padding: 1%;
				margin: 0px;
			}
			#description {
				padding: 1%;
				margin: 0px;
			}
			#p5_loading {
				text-align: center;
            			box-sizing: border-box;
				font-weight: bold;
				font-size: 4em;
			}
			#attribution {
				padding: 1%;
				margin: 0px;
			}
			a:link {
				color: purple;
				background-color: transparent;
			}
			a:hover {
				color: red;
				background-color: transparent;
			}
			a:active {
				color: white;
				background-color: transparent;
			}
			h1 {
				text-align: center;
				font-size: 4em;
				margin-block-start: 0px;
				margin-block-end: 0px;
				margin-inline-start: 0px;
				margin-inline-end: 0px;
				font-weight: normal;
			}
			.p-footer {
				text-align: center;
				font-size: 4em;
				margin-block-start: 0px;
				margin-block-end: 0px;
				margin-inline-start: 0px;
				margin-inline-end: 0px;
				font-weight: bold;
			}
			#title {
				margin: auto;
				text-align: center;
			}
			#grid-container {
				display: grid;
				gap: 1.25vh 1.25vh;
				grid-template-columns: 1fr 1fr 1fr;
				grid-template-rows: 1fr 1fr 1fr 1fr;
				padding: 25px 10px 0px 10px;
			}
			#grid-container > div {
				color: white;
				text-align: center;
				padding: 1.25vw 2.5vh;
				font-family: Helvetica, Arial, sans-serif;
			}
			div > p {
				margin: 10px 0px 0px;
			}
			#wip-logo {
				height: 35px;
				width: auto;
				background-color: white;
			}
			.grid-logo-img {
				height: 35px;
				width: auto;
			}
			#armor-logo {
				height: 35px;
				width: 35px;
			}
			#item-7 {
				grid-row: 3;
				grid-column: 1 / span 3;
				border: 0px !important;
				font-family: "Courier New", monospace !important;
				font-size: 4em;
			}
			#item-26 {
				grid-row: 10;
				grid-column: 1 / span 3;
				border: 0px !important;
				font-family: "Courier New", monospace !important;
				font-size: 4em;
			}
			#item-33 {
				grid-row: 13;
				grid-column: 1 / span 3;
				border: 0px !important;
				font-family: "Courier New", monospace !important;
				font-size: 4em;
			}
			.grid-img {
				height: 35px;
				border: 1px solid #ccc;
				color: white;
			}
			.grid-div {
				border: 1px solid #ccc;
			}
			#logo {
				background-color: white;
			}
			.window {
    			border: 1px solid #ccc;
			}
		</style>
		<link rel="stylesheet" type="text/css" href="/footer.css">
	</head>

	<script>
		let hiddenCounter = 0;
		function hiddenClick() {
			hiddenCounter++;
			document.getElementById("htitle").innerHTML = "dynamic productions (" + hiddenCounter + ")";
		}
	</script>
	
	<body>
		<div id="title">
			<img id="logo" src="assets/images/logos/productions.svg" alt="dynamic productions logo">
			<h1 id="htitle" onclick="hiddenClick()">dynamic productions</h1>
		</div>

		<footer>
			<iframe src="/footer.html" onload="this.before((this.contentDocument.body||this.contentDocument).children[0]);this.remove()"></iframe>
		</footer>
	</body>

</html>
